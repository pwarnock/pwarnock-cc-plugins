name: Check README sync
on:
  pull_request:
    paths:
      - '.claude-plugin/marketplace.json'
      - 'skills/*/SKILL.md'
      - 'README.md'
      - 'SKILLS.md'
      - 'scripts/sync-readme.ts'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun run check-readme
